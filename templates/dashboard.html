<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bermuda Grocery Price Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .price-card {
            transition: transform 0.2s;
        }
        .price-card:hover {
            transform: translateY(-5px);
        }
        .price-increase {
            color: #dc3545;
        }
        .price-decrease {
            color: #198754;
        }
        .store-badge {
            font-size: 0.8em;
        }
        .refresh-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">
                🏪 Bermuda Grocery Price Monitor
            </a>
            <span class="navbar-text">
                Real-time AI-powered price tracking
            </span>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- Store Statistics -->
        <div class="row mb-4">
            <div class="col-12">
                <h3>📊 Store Performance</h3>
                <div class="row" id="store-stats">
                    <!-- Store cards will be populated here -->
                </div>
            </div>
        </div>

        <!-- Recent Price Changes -->
        <div class="row mb-4">
            <div class="col-12">
                <h3>📈 Recent Price Changes</h3>
                <div class="table-responsive">
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>Product</th>
                                <th>Store</th>
                                <th>Previous Price</th>
                                <th>Current Price</th>
                                <th>Change</th>
                                <th>Last Updated</th>
                            </tr>
                        </thead>
                        <tbody id="price-changes">
                            <!-- Price changes will be populated here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Product Search -->
        <div class="row mb-4">
            <div class="col-12">
                <h3>🔍 Product Price Comparison</h3>
                <div class="mb-3">
                    <input type="text" class="form-control" id="product-search" 
                           placeholder="Search for a product (e.g., BANANAS, MILK_HALF_GALLON)">
                </div>
                <div class="row" id="product-comparison">
                    <!-- Product comparison will be populated here -->
                </div>
            </div>
        </div>

        <!-- Scraping Sessions -->
        <div class="row mb-4">
            <div class="col-12">
                <h3>🔄 Scraping Sessions</h3>
                <div class="table-responsive">
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>Start Time</th>
                                <th>End Time</th>
                                <th>URLs Processed</th>
                                <th>Success Rate</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="scraping-sessions">
                            <!-- Sessions will be populated here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Refresh Button -->
    <button class="btn btn-primary btn-lg refresh-btn" onclick="refreshData()">
        🔄 Refresh
    </button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Load data on page load
        window.onload = function() {
            loadStoreStats();
            loadPriceChanges();
            loadScrapingSessions();
        };

        // Auto-refresh every 5 minutes
        setInterval(refreshData, 300000);

        function refreshData() {
            loadStoreStats();
            loadPriceChanges();
            loadScrapingSessions();
        }

        function loadStoreStats() {
            fetch('/api/stores')
                .then(response => response.json())
                .then(data => {
                    const container = document.getElementById('store-stats');
                    container.innerHTML = '';
                    
                    data.forEach(store => {
                        const card = `
                            <div class="col-md-3 mb-3">
                                <div class="card price-card">
                                    <div class="card-body">
                                        <h5 class="card-title">${store.store}</h5>
                                        <p class="card-text">
                                            <strong>${store.total_products}</strong> products<br>
                                            Avg: $${store.avg_price}<br>
                                            Range: $${store.min_price} - $${store.max_price}
                                        </p>
                                    </div>
                                </div>
                            </div>
                        `;
                        container.innerHTML += card;
                    });
                })
                .catch(error => console.error('Error loading store stats:', error));
        }

        function loadPriceChanges() {
            fetch('/api/changes')
                .then(response => response.json())
                .then(data => {
                    const tbody = document.getElementById('price-changes');
                    tbody.innerHTML = '';
                    
                    data.forEach(change => {
                        const changeClass = change.price_change_percent > 0 ? 'price-increase' : 'price-decrease';
                        const changeIcon = change.price_change_percent > 0 ? '↗️' : '↘️';
                        
                        const row = `
                            <tr>
                                <td>${change.product_name}</td>
                                <td><span class="badge bg-secondary store-badge">${change.store}</span></td>
                                <td>$${change.previous_price}</td>
                                <td>$${change.current_price}</td>
                                <td class="${changeClass}">
                                    ${changeIcon} ${change.price_change_percent}%
                                </td>
                                <td>${new Date(change.last_scraped).toLocaleString()}</td>
                            </tr>
                        `;
                        tbody.innerHTML += row;
                    });
                })
                .catch(error => console.error('Error loading price changes:', error));
        }

        function loadScrapingSessions() {
            fetch('/api/sessions')
                .then(response => response.json())
                .then(data => {
                    const tbody = document.getElementById('scraping-sessions');
                    tbody.innerHTML = '';
                    
                    data.forEach(session => {
                        const statusBadge = session.status === 'completed' ? 'bg-success' : 'bg-warning';
                        
                        const row = `
                            <tr>
                                <td>${new Date(session.session_start).toLocaleString()}</td>
                                <td>${session.session_end ? new Date(session.session_end).toLocaleString() : 'Running'}</td>
                                <td>${session.urls_processed}</td>
                                <td>
                                    <div class="progress">
                                        <div class="progress-bar" role="progressbar" 
                                             style="width: ${session.success_rate}%">
                                            ${session.success_rate}%
                                        </div>
                                    </div>
                                </td>
                                <td><span class="badge ${statusBadge}">${session.status}</span></td>
                            </tr>
                        `;
                        tbody.innerHTML += row;
                    });
                })
                .catch(error => console.error('Error loading sessions:', error));
        }

        // Product search functionality
        document.getElementById('product-search').addEventListener('input', function(e) {
            const query = e.target.value.trim();
            if (query.length > 2) {
                searchProducts(query);
            } else {
                document.getElementById('product-comparison').innerHTML = '';
            }
        });

        function searchProducts(query) {
            fetch(`/api/products?product=${encodeURIComponent(query)}`)
                .then(response => response.json())
                .then(data => {
                    const container = document.getElementById('product-comparison');
                    container.innerHTML = '';
                    
                    if (data.length === 0) {
                        container.innerHTML = '<p class="text-muted">No products found</p>';
                        return;
                    }
                    
                    data.forEach(product => {
                        const card = `
                            <div class="col-md-3 mb-3">
                                <div class="card price-card">
                                    <div class="card-body">
                                        <h6 class="card-title">${product.product_title}</h6>
                                        <p class="card-text">
                                            <span class="badge bg-secondary store-badge">${product.store}</span><br>
                                            <strong class="h4 text-primary">$${product.current_price}</strong><br>
                                            <small class="text-muted">Updated: ${new Date(product.last_scraped).toLocaleString()}</small>
                                        </p>
                                    </div>
                                </div>
                            </div>
                        `;
                        container.innerHTML += card;
                    });
                })
                .catch(error => console.error('Error searching products:', error));
        }
    </script>
</body>
</html>
